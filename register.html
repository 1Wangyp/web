<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 轻松启蒙</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .register-section {
            padding: 60px 0;
            background-color: var(--background-color);
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
        }
        .register-container {
            background-color: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header h2 {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 10px;
        }
        .register-header p {
            font-size: 16px;
            color: var(--text-light);
        }
        .register-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
        }
        .form-group input {
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(255, 232, 139, 0.2);
        }
        .form-group .verification-code {
            display: flex;
            gap: 10px;
        }
        .form-group .verification-code input {
            flex: 1;
        }
        .form-group .verification-code button {
            background-color: var(--primary-color);
            color: var(--text-color);
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .form-group .verification-code button:hover {
            background-color: #FFC107;
        }
        .form-options {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .form-options input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        .form-options label {
            color: var(--text-light);
            cursor: pointer;
        }
        .form-options a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .form-options a:hover {
            text-decoration: underline;
        }
        .register-btn {
            background-color: var(--primary-color);
            color: var(--text-color);
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .register-btn:hover {
            transform: scale(1.02);
            background-color: #FFC107;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-light);
        }
        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .floating-back-btn {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .floating-back-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        .floating-back-btn i {
            font-size: 20px;
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <!-- 顶部导航区 -->
    <header class="top-nav">
        <div class="container">
            <div class="nav-left">
                <div class="logo">
                    <img src="image/生成APP引导页首屏.png" alt="轻松启蒙" class="mascot">
                    <h1>轻松启蒙</h1>
                </div>
            </div>
            <div class="nav-right">
                <nav class="main-nav">
                    <a href="index.html" class="nav-item">首页</a>
                    <a href="product.html" class="nav-item">产品中心</a>
                    <a href="about.html" class="nav-item">关于我们</a>
                    <a href="contact.html" class="nav-item">联系我们</a>
                </nav>
                <div class="nav-actions">
                    <a href="login.html" class="nav-btn">登录</a>
                    <a href="register.html" class="nav-btn primary active">注册</a>
                </div>
            </div>
        </div>
    </header>

    <!-- 悬浮返回按钮 -->
    <div class="floating-back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </div>

    <!-- 注册区 -->
    <section class="register-section">
        <div class="container">
            <div class="register-container">
                <div class="register-header">
                    <h2>注册</h2>
                    <p>创建您的轻松启蒙账号</p>
                </div>
                <form class="register-form">
                    <div class="form-group">
                        <label for="email">邮箱/手机号</label>
                        <input type="text" id="email" name="email" placeholder="请输入邮箱或手机号">
                    </div>
                    <div class="form-group">
                        <label for="verification">验证码</label>
                        <div class="verification-code">
                            <input type="text" id="verification" name="verification" placeholder="请输入验证码">
                            <button type="button">获取验证码</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请设置密码（6-20位）">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">确认密码</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="请确认密码">
                    </div>
                    <div class="form-options">
                        <input type="checkbox" id="agreement" name="agreement">
                        <label for="agreement">我已阅读并同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a></label>
                    </div>
                    <button type="submit" class="register-btn">注册</button>
                </form>
                <div class="login-link">
                    已有账号？ <a href="login.html">立即登录</a>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部信息区 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="logo">
                        <img src="image/生成APP引导页首屏.png" alt="轻松启蒙" class="mascot">
                        <h2>轻松启蒙</h2>
                    </div>
                    <p>专业的幼儿教育平台，为孩子提供全面的启蒙教育体验</p>
                    <div class="social-links">
                        <a href="#" class="social-link"><i class="fab fa-weixin"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-weibo"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-qq"></i></a>
                    </div>
                </div>
                <div class="footer-nav">
                    <h3>产品中心</h3>
                    <ul>
                        <li><a href="product.html">趣味启蒙</a></li>
                        <li><a href="product.html">互动绘本</a></li>
                        <li><a href="product.html">儿歌动画</a></li>
                        <li><a href="product.html">家长中心</a></li>
                    </ul>
                </div>
                <div class="footer-nav">
                    <h3>关于我们</h3>
                    <ul>
                        <li><a href="about.html">公司简介</a></li>
                        <li><a href="about.html">团队介绍</a></li>
                        <li><a href="about.html">新闻动态</a></li>
                        <li><a href="about.html">加入我们</a></li>
                    </ul>
                </div>
                <div class="footer-contact">
                    <h3>联系我们</h3>
                    <ul>
                        <li><i class="fas fa-phone"></i> 400-123-4567</li>
                        <li><i class="fas fa-envelope"></i> contact@qingsongqimeng.com</li>
                        <li><i class="fas fa-map-marker-alt"></i> 北京市海淀区中关村大街1号</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 轻松启蒙 版权所有 | 京ICP备12345678号</p>
            </div>
        </div>
    </footer>

    <script>
        // 注册表单提交事件
        document.querySelector('.register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const verification = document.getElementById('verification').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const agreement = document.getElementById('agreement').checked;
            
            if (!email) {
                alert('请输入邮箱/手机号');
                return;
            }
            if (!verification) {
                alert('请输入验证码');
                return;
            }
            if (!password) {
                alert('请设置密码');
                return;
            }
            if (password.length < 6 || password.length > 20) {
                alert('密码长度应在6-20位之间');
                return;
            }
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            if (!agreement) {
                alert('请阅读并同意用户协议和隐私政策');
                return;
            }
            
            // 这里可以添加实际的注册逻辑
            alert('注册成功');
            window.location.href = 'login.html';
        });
        
        // 获取验证码按钮点击事件
        document.querySelector('.verification-code button').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('请输入邮箱/手机号');
                return;
            }
            
            // 这里可以添加实际的发送验证码逻辑
            alert('验证码已发送');
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
